name: CI - Pipeline SSP-DF

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHONUNBUFFERED: "1"
  TF_CPP_MIN_LOG_LEVEL: "3"
  SSPDF_LOG_DIR: "/tmp/sspdf_logs"
  SSPDF_DISABLE_TRACKING: "true"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Instalar ruff
        run: pip install ruff
      - name: Lint
        run: ruff check src/ tests/ --output-format=github

  test:
    name: Testes Unitarios e Regressao
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Criar diretorios necessarios
        run: mkdir -p data/input outputs/logs
      - name: Copiar dados de amostra para CI
        run: |
          if [ -f data/input/amostra_ssp.csv ]; then
            echo "Dados de amostra encontrados."
          else
            echo "Gerando dados sinteticos para CI..."
            python - <<'EOF'
            import pandas as pd, numpy as np, os
            from datetime import datetime, timedelta

            n = 500
            np.random.seed(42)
            df = pd.DataFrame({
                "placa":      [f"ABC{str(i%50).zfill(4)}" for i in range(n)],
                "timestamp":  [datetime(2024,1,1) + timedelta(minutes=i*10) for i in range(n)],
                "latitude":   np.random.uniform(-15.9, -15.6, n),
                "longitude":  np.random.uniform(-47.9, -47.5, n),
                "regiao_adm": np.random.choice(["Plano Piloto", "Taguatinga", "Ceilandia"], n),
            })
            os.makedirs("data/input", exist_ok=True)
            df.to_csv("data/input/amostra_ssp.csv", index=False)
            print(f"Gerados {n} registros sinteticos.")
            EOF
          fi
      - name: Testes unitarios
        run: pytest tests/ -v --tb=short -x --ignore=tests/test_inference.py -k "not test_stability and not TestDeterminism"
        env:
          PYTHONPATH: .
      - name: Teste de regressao C1/C2
        run: pytest tests/test_regression_c1_c2.py -v
        env:
          PYTHONPATH: .

  security:
    name: Seguranca de Dependencias (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar pip-audit
        run: pip install pip-audit
      - name: Auditar dependencias
        run: pip-audit -r requirements.txt --ignore-vuln GHSA-34jh-p97f-mpxf
        continue-on-error: true
